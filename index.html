<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#f9f9f7" id="metaTheme">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>Mis Finanzas</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<style>
/* ============================ TOKENS ============================ */
:root{
  --bg:#f9f9f7; --surface:#fcfcfb; --ink:#0b0b0b; --ink2:#52514e; --muted:#898781;
  --grid:#e1e0d9; --baseline:#c3c2b7; --border:rgba(11,11,11,.10);
  --s1:#2a78d6; --s2:#1baf7a; --s3:#eda100; --s4:#008300; --s5:#4a3aa7;
  --s6:#e34948; --s7:#e87ba4; --s8:#eb6834;
  --good:#0ca30c; --warn:#fab219; --serious:#ec835a; --crit:#d03b3b;
  --delta-good:#006300; --accent:#2a78d6; --accent-ink:#ffffff;
  --sheet-shadow:0 -8px 40px rgba(0,0,0,.18);
  --card-shadow:0 1px 2px rgba(0,0,0,.04), 0 4px 16px rgba(0,0,0,.05);
}
[data-theme="dark"]{
  --bg:#0d0d0d; --surface:#1a1a19; --ink:#ffffff; --ink2:#c3c2b7; --muted:#898781;
  --grid:#2c2c2a; --baseline:#383835; --border:rgba(255,255,255,.10);
  --s1:#3987e5; --s2:#199e70; --s3:#c98500; --s4:#008300; --s5:#9085e9;
  --s6:#e66767; --s7:#d55181; --s8:#d95926;
  --delta-good:#0ca30c; --accent:#3987e5;
  --card-shadow:0 1px 2px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.25);
}

/* ============================ BASE ============================ */
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0; background:var(--bg); color:var(--ink);
  font-family:system-ui,-apple-system,"Segoe UI",sans-serif; font-size:16px;
  transition:background .25s ease, color .25s ease}
body{overscroll-behavior-y:contain}
#app{max-width:540px; margin:0 auto; padding:0 16px calc(84px + env(safe-area-inset-bottom));
  min-height:100vh}
button{font:inherit; border:none; background:none; color:inherit; cursor:pointer; padding:0}
input,select,textarea{font:inherit; color:var(--ink); background:var(--surface);
  border:1px solid var(--border); border-radius:12px; padding:12px 14px; width:100%; outline:none}
input:focus,select:focus,textarea:focus{border-color:var(--accent)}
h1,h2,h3{margin:0}
.num{font-variant-numeric:tabular-nums}

/* ============================ HEADER ============================ */
header{display:flex; align-items:center; justify-content:space-between;
  padding:18px 2px 10px; position:sticky; top:0; background:var(--bg); z-index:5;
  transition:background .25s ease}
header .title{font-size:22px; font-weight:800; letter-spacing:-.02em}
#syncDot{width:10px; height:10px; border-radius:50%; background:var(--muted); display:inline-block;
  margin-left:8px; vertical-align:2px; transition:background .3s}
#syncDot.ok{background:var(--good)} #syncDot.busy{background:var(--warn); animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.35}}
#btnRefresh{width:38px; height:38px; border-radius:50%; display:grid; place-items:center;
  color:var(--ink2); background:var(--surface); border:1px solid var(--border)}
#btnRefresh.spin svg{animation:rot 1s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
#ptr{height:0; overflow:hidden; text-align:center; color:var(--muted); font-size:13px;
  transition:height .2s ease; line-height:34px}

/* ============================ CARDS / GENERALES ============================ */
.card{background:var(--surface); border:1px solid var(--border); border-radius:20px;
  padding:18px; margin-bottom:14px; box-shadow:var(--card-shadow);
  transition:background .25s ease, border-color .25s ease}
.card h3{font-size:13px; font-weight:700; text-transform:uppercase; letter-spacing:.06em;
  color:var(--muted); margin-bottom:14px}
.banner{background:var(--surface); border:1px dashed var(--baseline); border-radius:14px;
  padding:10px 14px; font-size:13px; color:var(--ink2); margin-bottom:14px}
.banner b{color:var(--ink)}
.empty{color:var(--muted); font-size:14px; text-align:center; padding:26px 10px}

/* Selector de mes */
.monthbar{display:flex; align-items:center; justify-content:center; gap:6px; margin:2px 0 14px}
.monthbar button{width:38px; height:38px; border-radius:50%; color:var(--ink2); font-size:18px;
  display:grid; place-items:center}
.monthbar button:active{background:var(--surface)}
.monthbar .label{font-weight:700; font-size:16px; min-width:150px; text-align:center;
  text-transform:capitalize}

/* Hero */
.hero .lbl{font-size:13px; color:var(--muted); font-weight:600}
.hero .big{font-size:38px; font-weight:800; letter-spacing:-.03em; margin:2px 0 6px}
.delta{display:inline-flex; align-items:center; gap:5px; font-size:13px; font-weight:600;
  padding:4px 10px; border-radius:999px; background:var(--bg); color:var(--ink2)}
.delta.good{color:var(--delta-good)}
.hero .sub{display:flex; gap:18px; margin-top:12px; font-size:13px; color:var(--ink2)}
.hero .sub b{display:block; font-size:16px; color:var(--ink); font-weight:700; margin-top:1px}

/* Dona */
.donutwrap{display:flex; align-items:center; justify-content:center; position:relative; margin:4px 0 10px}
.donutcenter{position:absolute; text-align:center}
.donutcenter .v{font-size:19px; font-weight:800}
.donutcenter .l{font-size:11px; color:var(--muted); font-weight:600}
.legend{display:flex; flex-direction:column; gap:2px}
.legend .row{display:flex; align-items:center; gap:10px; padding:8px 6px; border-radius:12px}
.legend .row:active{background:var(--bg)}
.dot{width:10px; height:10px; border-radius:3px; flex:none}
.legend .name{flex:1; font-size:14px; font-weight:600}
.legend .amt{font-size:14px; font-weight:600}
.legend .pct{font-size:12px; color:var(--muted); width:44px; text-align:right}

/* Barras ingresos vs gastos */
.hbar{margin:10px 0}
.hbar .top{display:flex; justify-content:space-between; font-size:13px; margin-bottom:5px}
.hbar .top .n{font-weight:700}
.hbar .track{height:14px; background:var(--bg); border-radius:5px; overflow:hidden}
.hbar .fill{height:100%; border-radius:0 4px 4px 0; min-width:2px; transition:width .5s cubic-bezier(.2,.8,.2,1)}

/* Tendencia (línea) */
.chart{position:relative}
.chart svg{display:block; width:100%; height:auto}
.tooltip{position:absolute; background:var(--ink); color:var(--bg); font-size:12px; font-weight:600;
  padding:6px 10px; border-radius:9px; pointer-events:none; transform:translate(-50%,-120%);
  white-space:nowrap; opacity:0; transition:opacity .15s; z-index:3}
.tooltip.show{opacity:1}
.axis{font-size:10px; fill:var(--muted)}

/* Medidor de presupuesto */
.meter{padding:10px 2px}
.meter .top{display:flex; justify-content:space-between; align-items:baseline; margin-bottom:6px}
.meter .cat{font-weight:700; font-size:14px}
.meter .amt{font-size:12px; color:var(--ink2)}
.meter .track{height:8px; background:var(--bg); border-radius:4px; overflow:hidden}
.meter .fill{height:100%; border-radius:4px; transition:width .5s cubic-bezier(.2,.8,.2,1)}
.meter .status{display:flex; align-items:center; gap:6px; font-size:12px; font-weight:600; margin-top:6px}

/* Movimientos */
.toolbar{position:sticky; top:64px; z-index:4; background:var(--bg); padding:4px 0 10px;
  transition:background .25s ease}
.chips{display:flex; gap:8px; overflow-x:auto; padding:10px 2px 2px; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:none; padding:7px 14px; border-radius:999px; background:var(--surface); font-size:13px;
  font-weight:600; color:var(--ink2); border:1px solid var(--border); transition:all .15s}
.chip.on{background:var(--ink); color:var(--bg); border-color:var(--ink)}
.dayhead{font-size:12px; font-weight:700; color:var(--muted); text-transform:uppercase;
  letter-spacing:.05em; margin:18px 4px 8px}
.tx{display:flex; align-items:center; gap:12px; background:var(--surface); border:1px solid var(--border);
  border-radius:16px; padding:12px 14px; margin-bottom:8px; transition:transform .1s}
.tx:active{transform:scale(.98)}
.tx .ic{width:38px; height:38px; border-radius:12px; display:grid; place-items:center; flex:none;
  background:var(--bg); font-size:17px}
.tx .mid{flex:1; min-width:0}
.tx .who{font-weight:700; font-size:14px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.tx .catchip{display:inline-block; font-size:11px; font-weight:600; color:var(--ink2);
  background:var(--bg); border-radius:999px; padding:2px 8px; margin-top:3px}
.tx .catchip.indef{color:var(--serious); background:transparent; border:1px dashed var(--serious)}
.tx .amt{font-weight:700; font-size:14px; text-align:right}
.tx .amt.in{color:var(--delta-good)}
.fab{position:fixed; right:max(18px, calc(50% - 252px)); bottom:calc(92px + env(safe-area-inset-bottom));
  width:56px; height:56px; border-radius:18px; background:var(--accent); color:var(--accent-ink);
  font-size:26px; display:grid; place-items:center; box-shadow:0 6px 20px rgba(42,120,214,.4); z-index:5;
  transition:transform .15s}
.fab:active{transform:scale(.92)}

/* Comparativa */
.cmp{width:100%; border-collapse:collapse; font-size:13px}
.cmp td{padding:8px 4px; border-bottom:1px solid var(--grid)}
.cmp tr:last-child td{border-bottom:none}
.cmp .c{font-weight:600}
.cmp .v{text-align:right}
.cmp .d{text-align:right; font-weight:600; width:70px}
.cmp .d.up{color:var(--ink2)} .cmp .d.down{color:var(--delta-good)}

/* Metas */
.goal .top{display:flex; justify-content:space-between; align-items:baseline}
.goal .nm{font-weight:800; font-size:16px}
.goal .pc{font-size:13px; font-weight:700; color:var(--ink2)}
.goal .track{height:10px; background:var(--bg); border-radius:5px; overflow:hidden; margin:10px 0 8px}
.goal .fill{height:100%; background:var(--s2); border-radius:5px; transition:width .6s cubic-bezier(.2,.8,.2,1)}
.goal .sub{font-size:13px; color:var(--ink2)}
.goal .note{font-size:12px; color:var(--muted); margin-top:6px}

/* Ajustes */
.setrow{display:flex; align-items:center; justify-content:space-between; padding:14px 2px;
  border-bottom:1px solid var(--grid); gap:12px}
.setrow:last-child{border-bottom:none}
.setrow .l{font-weight:600; font-size:14px}
.setrow .s{font-size:12px; color:var(--muted); margin-top:2px}
.seg{display:flex; background:var(--bg); border-radius:12px; padding:3px; gap:2px}
.seg button{padding:7px 13px; border-radius:9px; font-size:13px; font-weight:600; color:var(--ink2)}
.seg button.on{background:var(--surface); color:var(--ink); box-shadow:0 1px 4px rgba(0,0,0,.12)}
.btn{display:block; width:100%; text-align:center; padding:14px; border-radius:14px; font-weight:700;
  background:var(--accent); color:var(--accent-ink); transition:transform .1s}
.btn:active{transform:scale(.98)}
.btn.ghost{background:var(--bg); color:var(--ink); border:1px solid var(--border)}
.btn.danger{background:transparent; color:var(--crit); border:1px solid var(--crit)}
.btn[disabled]{opacity:.5}
.field{margin-bottom:12px}
.field label{display:block; font-size:12px; font-weight:700; color:var(--muted); margin-bottom:6px;
  text-transform:uppercase; letter-spacing:.04em}

/* ============================ NAVEGACIÓN INFERIOR ============================ */
nav{position:fixed; bottom:0; left:0; right:0; z-index:10;
  background:color-mix(in srgb, var(--surface) 92%, transparent);
  backdrop-filter:blur(14px); -webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--border); padding-bottom:env(safe-area-inset-bottom)}
nav .inner{max-width:540px; margin:0 auto; display:flex}
nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;
  padding:10px 0 8px; color:var(--muted); font-size:10.5px; font-weight:600; transition:color .2s}
nav button.on{color:var(--accent)}
nav svg{width:23px; height:23px}

/* ============================ VISTAS / TRANSICIONES ============================ */
.view{display:none; animation:viewin .25s cubic-bezier(.2,.8,.2,1)}
.view.on{display:block}
@keyframes viewin{from{opacity:0; transform:translateY(10px)}to{opacity:1; transform:none}}

/* ============================ BOTTOM SHEET ============================ */
#backdrop{position:fixed; inset:0; background:rgba(0,0,0,.45); z-index:20; opacity:0;
  pointer-events:none; transition:opacity .25s}
#backdrop.show{opacity:1; pointer-events:auto}
#sheet{position:fixed; left:0; right:0; bottom:0; z-index:21; background:var(--surface);
  border-radius:24px 24px 0 0; padding:10px 20px calc(24px + env(safe-area-inset-bottom));
  transform:translateY(105%); transition:transform .3s cubic-bezier(.2,.8,.2,1);
  max-width:540px; margin:0 auto; max-height:86vh; overflow-y:auto; box-shadow:var(--sheet-shadow)}
#sheet.show{transform:none}
#sheet .grab{width:40px; height:4px; border-radius:2px; background:var(--baseline); margin:4px auto 16px}
#sheet h2{font-size:19px; font-weight:800; margin-bottom:14px}
.catgrid{display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin:6px 0 16px}
.catgrid button{padding:11px 4px; border-radius:12px; background:var(--bg); font-size:12.5px;
  font-weight:600; border:1.5px solid transparent; color:var(--ink2)}
.catgrid button.on{border-color:var(--accent); color:var(--accent); background:transparent; font-weight:700}

/* ============================ TOAST ============================ */
#toast{position:fixed; left:50%; bottom:calc(100px + env(safe-area-inset-bottom));
  transform:translate(-50%,20px); background:var(--ink); color:var(--bg); padding:11px 18px;
  border-radius:999px; font-size:13.5px; font-weight:600; opacity:0; transition:all .25s;
  z-index:30; max-width:86vw; text-align:center; pointer-events:none}
#toast.show{opacity:1; transform:translate(-50%,0)}
</style>
</head>
<body>

<div id="ptr">↓ Soltá para actualizar</div>
<div id="app">
  <header>
    <div class="title">Mis Finanzas<span id="syncDot"></span></div>
    <button id="btnRefresh" aria-label="Actualizar" onclick="sync(true)">
      <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 12a9 9 0 1 1-2.6-6.4"/><path d="M21 3v6h-6"/></svg>
    </button>
  </header>

  <div id="demoBanner" class="banner" style="display:none">
    <b>Modo demostración.</b> Estás viendo datos de ejemplo — conectá tu Google Sheet en <b>Ajustes</b>.
  </div>

  <div id="view-inicio" class="view"></div>
  <div id="view-movs" class="view"></div>
  <div id="view-pres" class="view"></div>
  <div id="view-metas" class="view"></div>
  <div id="view-ajustes" class="view"></div>
</div>

<button class="fab" id="fab" onclick="abrirNuevaTx()" style="display:none">＋</button>

<nav><div class="inner">
  <button data-v="inicio" class="on"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 10.5 12 3l9 7.5"/><path d="M5 9.5V21h14V9.5"/></svg>Inicio</button>
  <button data-v="movs"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Movimientos</button>
  <button data-v="pres"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 3v18M7 8c0-2 2.2-3 5-3s5 1 5 3-2 3-5 3-5 1-5 3 2.2 3 5 3 5-1 5-3"/></svg>Presupuestos</button>
  <button data-v="metas"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="5"/><circle cx="12" cy="12" r="1.2" fill="currentColor"/></svg>Metas</button>
  <button data-v="ajustes"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="3.2"/><path d="M19.4 15a1.7 1.7 0 0 0 .34 1.87l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.7 1.7 0 0 0-1.87-.34 1.7 1.7 0 0 0-1 1.55V21a2 2 0 1 1-4 0v-.09a1.7 1.7 0 0 0-1-1.55 1.7 1.7 0 0 0-1.87.34l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.7 1.7 0 0 0 .34-1.87 1.7 1.7 0 0 0-1.55-1H3a2 2 0 1 1 0-4h.09a1.7 1.7 0 0 0 1.55-1 1.7 1.7 0 0 0-.34-1.87l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.7 1.7 0 0 0 1.87.34h0a1.7 1.7 0 0 0 1-1.55V3a2 2 0 1 1 4 0v.09a1.7 1.7 0 0 0 1 1.55h0a1.7 1.7 0 0 0 1.87-.34l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.7 1.7 0 0 0-.34 1.87v0a1.7 1.7 0 0 0 1.55 1H21a2 2 0 1 1 0 4h-.09a1.7 1.7 0 0 0-1.55 1z"/></svg>Ajustes</button>
</div></nav>

<div id="backdrop" onclick="cerrarSheet()"></div>
<div id="sheet"><div class="grab"></div><div id="sheetBody"></div></div>
<div id="toast"></div>

<script>
'use strict';
/* ================================================================
   MIS FINANZAS — PWA conectada al BAC Tracker (Google Sheets)
   ================================================================ */

// ---------- Constantes ----------
const CATEGORIAS = ['Comida','Transporte','Ropa','Supermercado','Entretenimiento','Casa',
  'Regalos','Viaje','Educación','Deporte','Trabajo','Salud','Ingresos','Otros','Indefinido'];

// Mapa fijo categoría → slot de color (paleta validada; nunca se cicla:
// las categorías sin slot van en gris y se agrupan como "Otras" en la dona)
const CAT_COLOR = {
  'Comida':'--s1','Supermercado':'--s2','Transporte':'--s3','Casa':'--s4',
  'Entretenimiento':'--s5','Salud':'--s6','Trabajo':'--s7','Educación':'--s8'
};
const CAT_EMOJI = {
  'Comida':'🍔','Transporte':'🚗','Ropa':'👕','Supermercado':'🛒','Entretenimiento':'🎬',
  'Casa':'🏠','Regalos':'🎁','Viaje':'✈️','Educación':'📚','Deporte':'🏃','Trabajo':'💼',
  'Salud':'💊','Ingresos':'💰','Otros':'📦','Indefinido':'❔'
};

const LS_CFG = 'bt_config', LS_DATA = 'bt_data';

// ---------- Estado ----------
let cfg = leerLS(LS_CFG) || { url:'', token:'', theme:'auto' };
let data = leerLS(LS_DATA) || null;       // {tx, presupuestos, metas, ts}
let mesSel = mesKey(new Date());          // 'YYYY-MM' seleccionado
let filtroCat = '', filtroTxt = '';
let vistaActual = 'inicio';
let sincronizando = false;
let errorSync = null; // último error de sincronización (para mostrarlo en pantalla)

function leerLS(k){ try{ return JSON.parse(localStorage.getItem(k)); }catch(e){ return null; } }
function guardarLS(k,v){ localStorage.setItem(k, JSON.stringify(v)); }
const demo = () => !cfg.url || !cfg.token;

// ---------- Formato ----------
const fmtCRC = new Intl.NumberFormat('es-CR',{style:'currency',currency:'CRC',maximumFractionDigits:0});
const crc = n => fmtCRC.format(Math.round(n));
function mesKey(d){ return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
function mesNombre(mk, corto){
  const [y,m] = mk.split('-').map(Number);
  const n = new Date(y, m-1, 1).toLocaleDateString('es-CR',{month: corto?'short':'long'});
  return n.charAt(0).toUpperCase()+n.slice(1) + (corto ? '' : ' '+y);
}
function mesAnterior(mk){ const [y,m]=mk.split('-').map(Number); return mesKey(new Date(y, m-2, 1)); }
function esc(s){ return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function colorCat(cat){
  const v = CAT_COLOR[cat];
  return v ? getComputedStyle(document.documentElement).getPropertyValue(v).trim() : '#898781';
}

// ---------- Cálculos ----------
const txs = () => (data && data.tx) || [];
function txDelMes(mk){ return txs().filter(t => mesKey(new Date(t.f)) === mk); }
function gastosPorCat(mk){
  const out = {};
  txDelMes(mk).forEach(t => { if (t.cat !== 'Ingresos') out[t.cat] = (out[t.cat]||0) + t.m; });
  return out;
}
function totales(mk){
  let g = 0, i = 0;
  txDelMes(mk).forEach(t => { if (t.cat === 'Ingresos') i += t.m; else g += t.m; });
  return { gastos:g, ingresos:i };
}
function listaMeses(){
  const set = new Set(txs().map(t => mesKey(new Date(t.f))));
  set.add(mesKey(new Date()));
  return [...set].sort();
}

// ================================================================
// SINCRONIZACIÓN CON EL SHEET
// ================================================================
async function api(action, payload){
  if (demo()) return demoApi(action, payload || {});
  const res = await fetch(cfg.url, {
    method: 'POST',
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, // evita preflight CORS
    body: JSON.stringify(Object.assign({ token: cfg.token, action }, payload || {}))
  });
  const texto = await res.text();
  let json;
  try { json = JSON.parse(texto); }
  catch (e) {
    throw new Error('la URL no devolvió datos. Revisá que la implementación sea ' +
      '"Aplicación web" con acceso "Cualquier persona" y que la URL termine en /exec');
  }
  if (!json.ok) throw new Error(json.error || 'Error del servidor');
  return json;
}

async function sync(manual){
  if (sincronizando) return;
  sincronizando = true;
  document.getElementById('syncDot').className = 'busy';
  document.getElementById('btnRefresh').classList.add('spin');
  try {
    const r = await api('getData');
    data = { tx: r.tx, presupuestos: r.presupuestos, metas: r.metas, ts: Date.now() };
    guardarLS(LS_DATA, data);
    errorSync = null;
    document.getElementById('syncDot').className = 'ok';
    render();
    if (manual) toast('Datos actualizados ✓');
  } catch (e) {
    errorSync = e.message || String(e);
    document.getElementById('syncDot').className = '';
    if (!data) render(); // sin datos cacheados: mostrar el error en pantalla
    if (manual) toast('No se pudo sincronizar: ' + errorSync);
  } finally {
    sincronizando = false;
    document.getElementById('btnRefresh').classList.remove('spin');
  }
}

function demoApi(action, p){
  if (!data) generarDemo();
  if (action === 'getData') return Object.assign({ ok:true }, data);
  if (action === 'updateCategory'){
    const t = data.tx.find(x => x.fila === p.fila); let otras = 0;
    if (t){ t.cat = p.categoria;
      data.tx.forEach(x => { if (x !== t && x.c === t.c && x.cat === 'Indefinido'){ x.cat = p.categoria; otras++; } }); }
    guardarLS(LS_DATA, data);
    return { ok:true, otrasActualizadas: otras };
  }
  if (action === 'addTransaction'){
    data.tx.push({ fila: 9000 + data.tx.length, f: p.f || Date.now(), t: 'MANUAL',
      c: p.c, cat: p.categoria, m: p.m, n: p.n || '' });
    guardarLS(LS_DATA, data); return { ok:true };
  }
  if (action === 'saveBudgets'){ data.presupuestos = p.items; guardarLS(LS_DATA, data); return { ok:true }; }
  if (action === 'saveGoals'){ data.metas = p.items; guardarLS(LS_DATA, data); return { ok:true }; }
  if (action === 'ping') return { ok:true, pong:true };
  return { ok:false, error:'demo' };
}

    ['NETFLIX','Entretenimiento',7000,1],['SPOTIFY','Entretenimiento',3500,1],
    ['FARMACIA FISCHEL','Salud',12000,2],['EPA','Casa',18000,1],
    ['UDEMY','Educación',9000,1],['SMART FIT','Deporte',18500,1],
    ['TIENDA ARENAS','Ropa',25000,1],['KIOSKO ARTESANAL','Indefinido',8000,2]
  ];
  for (let m = 5; m >= 0; m--){

        t:'SINPE', c:'TRABAJO FREELANCE', cat:'Ingresos', m: 120000, n:'' });

// --- Dona por categoría ---
function cardDona(){
  const porCat = gastosPorCat(mesSel);
  const entradas = Object.entries(porCat).sort((a,b) => b[1]-a[1]);
  if (!entradas.length) return `<div class="card"><h3>Gasto por categoría</h3><div class="empty">Sin gastos este mes</div></div>`;
  const total = entradas.reduce((s,e) => s+e[1], 0);

  // Slices: categorías con color propio + "Otras" (gris) para el resto
  const conColor = entradas.filter(e => CAT_COLOR[e[0]]);
  const sinColor = entradas.filter(e => !CAT_COLOR[e[0]]);
  const otras = sinColor.reduce((s,e) => s+e[1], 0);
  const slices = conColor.map(e => ({ n:e[0], v:e[1], col:colorCat(e[0]) }));
  if (otras > 0) slices.push({ n:'Otras', v:otras, col:'#898781' });

  // SVG: arcos con gap de 2px entre segmentos
  const R = 68, W = 26, C = 90, circ = 2*Math.PI*R, gapPx = slices.length > 1 ? 2.5 : 0;
  let ang = -90, arcos = '';
  slices.forEach(s => {
    const frac = s.v / total, sweep = frac * 360;
    const gapA = (gapPx / (circ)) * 360;
    const a0 = ang + gapA/2, a1 = ang + sweep - gapA/2;
    if (a1 > a0){
      const x0 = C + R*Math.cos(a0*Math.PI/180), y0 = C + R*Math.sin(a0*Math.PI/180);
      const x1 = C + R*Math.cos(a1*Math.PI/180), y1 = C + R*Math.sin(a1*Math.PI/180);
      arcos += `<path d="M ${x0.toFixed(2)} ${y0.toFixed(2)} A ${R} ${R} 0 ${sweep-gapA > 180 ? 1 : 0} 1 ${x1.toFixed(2)} ${y1.toFixed(2)}"
        fill="none" stroke="${s.col}" stroke-width="${W}"/>`;
    }
    ang += sweep;
  });

  const filas = entradas.map(([cat, val]) => {
    const pct = Math.round(val/total*100);
    const col = CAT_COLOR[cat] ? colorCat(cat) : '#898781';
    return `<div class="row" onclick="verCat('${esc(cat)}')">
      <span class="dot" style="background:${col}"></span>
      <span class="name">${esc(cat)}</span>
      <span class="amt num">${crc(val)}</span>
      <span class="pct num">${pct}%</span>
    </div>`;
  }).join('');

  return `<div class="card"><h3>Gasto por categoría</h3>
    <div class="donutwrap">
      <svg viewBox="0 0 180 180" style="max-width:200px">${arcos}</svg>
      <div class="donutcenter"><div class="v num">${crc(total)}</div><div class="l">total</div></div>
    </div>
    <div class="legend">${filas}</div>
  </div>`;
}
function verCat(cat){ filtroCat = cat === 'Otras' ? '' : cat; filtroTxt=''; irA('movs'); render(); }

// --- Ingresos vs gastos ---
function cardFlujo(t){
  const max = Math.max(t.ingresos, t.gastos, 1);
  const barra = (nombre, valor, col) => `<div class="hbar">
    <div class="top"><span class="n">${nombre}</span><span class="num">${crc(valor)}</span></div>
    <div class="track"><div class="fill" style="width:${Math.max(valor/max*100, 1)}%; background:${col}"></div></div>
  </div>`;
  return `<div class="card"><h3>Ingresos vs gastos</h3>
    ${barra('Ingresos', t.ingresos, 'var(--s4)')}
    ${barra('Gastos', t.ingresos || t.gastos ? t.gastos : 0, 'var(--s6)')}
  </div>`;
}

// --- Tendencia 12 meses ---
function cardTendencia(){
  const meses = [];
  const [y,m] = mesSel.split('-').map(Number);
  for (let i = 11; i >= 0; i--) meses.push(mesKey(new Date(y, m-1-i, 1)));
  const vals = meses.map(mk => totales(mk).gastos);
  if (vals.every(v => v === 0)) return '';
  const W = 320, H = 150, padL = 8, padR = 8, padT = 14, padB = 22;
  const max = Math.max(...vals) * 1.12;
  const px = i => padL + i * (W - padL - padR) / (meses.length - 1);
  const py = v => padT + (1 - v/max) * (H - padT - padB);

  const linea = vals.map((v,i) => (i ? 'L' : 'M') + px(i).toFixed(1) + ' ' + py(v).toFixed(1)).join(' ');
  const area = linea + ` L ${px(vals.length-1).toFixed(1)} ${H-padB} L ${px(0).toFixed(1)} ${H-padB} Z`;
  const grid = [0.5, 1].map(f =>
    `<line x1="${padL}" x2="${W-padR}" y1="${py(max*f/1.12).toFixed(1)}" y2="${py(max*f/1.12).toFixed(1)}" stroke="var(--grid)" stroke-width="1"/>`).join('');
  const puntos = vals.map((v,i) =>
    `<circle cx="${px(i).toFixed(1)}" cy="${py(v).toFixed(1)}" r="12" fill="transparent"
       onclick="tipTendencia(event, ${i}, ${v}, '${meses[i]}')"/>` +
    (i === vals.length-1 ? `<circle cx="${px(i).toFixed(1)}" cy="${py(v).toFixed(1)}" r="4" fill="var(--s1)" stroke="var(--surface)" stroke-width="2"/>` : '')
  ).join('');
  const labels = meses.map((mk,i) => i % 2 === 0 ?
    `<text class="axis" x="${px(i).toFixed(1)}" y="${H-6}" text-anchor="middle">${mesNombre(mk, true).replace('.','')}</text>` : '').join('');

  return `<div class="card"><h3>Evolución del gasto — últimos 12 meses</h3>
    <div class="chart" id="chartTend">
      <svg viewBox="0 0 ${W} ${H}">
        ${grid}
        <line x1="${padL}" x2="${W-padR}" y1="${H-padB}" y2="${H-padB}" stroke="var(--baseline)" stroke-width="1"/>
        <path d="${area}" fill="var(--s1)" opacity="0.10"/>
        <path d="${linea}" fill="none" stroke="var(--s1)" stroke-width="2" stroke-linejoin="round"/>
        ${labels}${puntos}
      </svg>
      <div class="tooltip" id="tipTend"></div>
    </div>
  </div>`;
}
function tipTendencia(ev, i, v, mk){
  const tip = document.getElementById('tipTend');
  const svg = ev.currentTarget.ownerSVGElement.getBoundingClientRect();
  const wrap = document.getElementById('chartTend').getBoundingClientRect();
  tip.textContent = mesNombre(mk, true) + ' · ' + crc(v);
  tip.style.left = (ev.clientX - wrap.left) + 'px';
  tip.style.top = (svg.top - wrap.top + 20) + 'px';
  tip.classList.add('show');
  clearTimeout(tip._t); tip._t = setTimeout(() => tip.classList.remove('show'), 2200);
}

// --- Mini presupuestos en el dashboard ---
function cardPresupuestosMini(){
  const pres = (data.presupuestos || []);
  if (!pres.length) return '';
  const gastos = gastosPorCat(mesKey(new Date()));
  const filas = pres.map(p => medidor(p, gastos[p.cat] || 0))
    .sort((a,b) => b.pct - a.pct).slice(0,3).map(x => x.html).join('');
  return `<div class="card"><h3>Presupuestos de ${mesNombre(mesKey(new Date()), true).toLowerCase()}</h3>${filas}
    <button class="btn ghost" style="margin-top:8px" onclick="irA('pres')">Ver todos</button></div>`;
}

function medidor(p, gastado){
  const pct = gastado / p.limite;
  let col = 'var(--good)', ic = '✓', txt = 'En orden', tcol = 'var(--delta-good)';
  if (pct >= 1){ col = 'var(--crit)'; ic = '✕'; txt = 'Excedido'; tcol = 'var(--crit)'; }
  else if (pct >= 0.8){ col = 'var(--serious)'; ic = '⚠'; txt = 'Cerca del límite'; tcol = 'var(--serious)'; }
  const html = `<div class="meter">
    <div class="top"><span class="cat">${esc(p.cat)}</span>
      <span class="amt num">${crc(gastado)} / ${crc(p.limite)}</span></div>
    <div class="track"><div class="fill" style="width:${Math.min(pct*100,100)}%; background:${col}"></div></div>
    <div class="status" style="color:${tcol}">${ic} ${txt} · ${Math.round(pct*100)}%</div>
  </div>`;
  return { pct, html };
}

// --- Comparativa mes a mes ---
function cardComparativa(){
  const act = gastosPorCat(mesSel), ant = gastosPorCat(mesAnterior(mesSel));
  const cats = [...new Set([...Object.keys(act), ...Object.keys(ant)])]
    .sort((a,b) => (act[b]||0) - (act[a]||0));
  if (!cats.length) return '';
  const filas = cats.map(c => {
    const a = act[c]||0, b = ant[c]||0;
    let d = '—', cls = '';
    if (b > 0){ const p = Math.round((a-b)/b*100); d = (p>=0?'+':'')+p+'%'; cls = p > 0 ? 'up' : 'down'; }
    else if (a > 0){ d = 'nuevo'; cls = 'up'; }
    return `<tr><td class="c">${esc(c)}</td><td class="v num">${crc(a)}</td>
      <td class="v num" style="color:var(--muted)">${crc(b)}</td><td class="d ${cls}">${d}</td></tr>`;
  }).join('');
  return `<div class="card"><h3>${mesNombre(mesSel, true)} vs ${mesNombre(mesAnterior(mesSel), true)}</h3>
    <table class="cmp">
      <tr style="color:var(--muted); font-size:11px"><td></td><td class="v">Este mes</td><td class="v">Anterior</td><td class="d">Δ</td></tr>
      ${filas}
    </table></div>`;
}

function renderLista(){

      d.toLocaleDateString('es-CR',{weekday:'long', day:'numeric', month:'short'});

async function cambiarCategoria(fila, categoria){
  const t = txs().find(x => x.fila === fila);
  if (!t || t.cat === categoria){ cerrarSheet(); return; }
  const catAnterior = t.cat;
  t.cat = categoria; // actualización optimista
  cerrarSheet(); render();
  try {
    const r = await api('updateCategory', { fila: t.fila, f: t.f, c: t.c, m: t.m, categoria });
    if (r.otrasActualizadas > 0){
      txs().forEach(x => { if (x.c === t.c && x.cat === 'Indefinido') x.cat = categoria; });
      render();
      toast(`✓ Guardado (+ ${r.otrasActualizadas} del mismo comercio)`);
    } else toast('✓ Categoría guardada');
    guardarLS(LS_DATA, data);
  } catch (e) {
    t.cat = catAnterior; render();
    toast('✕ No se pudo guardar: ' + e.message);
  }
}

    <div class="field"><label>Descripción / comercio</label>
      <input id="nComercio" placeholder="Ej: Feria del agricultor"></div>
    <div class="field" id="fCat"><label>Categoría</label>
      <select id="nCat">${cats.map(c => `<option>${esc(c)}</option>`).join('')}</select></div>
    <div class="field"><label>Fecha</label>
      <input id="nFecha" type="date" value="${new Date().toISOString().slice(0,10)}"></div>
    <div class="field"><label>Nota (opcional)</label><input id="nNota"></div>
    <button class="btn" onclick="guardarNuevaTx()">Guardar</button>
  `);
}
let nuevoTipo = 'gasto';
function segNuevo(btn, tipo){
  nuevoTipo = tipo;
  btn.parentElement.querySelectorAll('button').forEach(b => b.classList.toggle('on', b === btn));
  document.getElementById('fCat').style.display = tipo === 'ingreso' ? 'none' : '';
}
async function guardarNuevaTx(){
  const m = Number(document.getElementById('nMonto').value);
  const c = document.getElementById('nComercio').value.trim();
  const fechaStr = document.getElementById('nFecha').value;
  if (!m || m <= 0 || !c){ toast('Poné el monto y la descripción'); return; }
  const categoria = nuevoTipo === 'ingreso' ? 'Ingresos' : document.getElementById('nCat').value;
  const f = fechaStr ? new Date(fechaStr + 'T12:00:00').getTime() : Date.now();
  cerrarSheet();
  try {
    await api('addTransaction', { m, c, categoria, f, n: document.getElementById('nNota') ? document.getElementById('nNota').value : '' });
    toast('✓ Movimiento registrado');
    await sync();
  } catch (e) { toast('✕ ' + e.message); }
}

// ================================================================
// VISTA: PRESUPUESTOS
// ================================================================
function renderPres(){
  const v = document.getElementById('view-pres');
  if (!data){ v.innerHTML = estadoCarga(); return; }
  const pres = data.presupuestos || [];
  const gastos = gastosPorCat(mesKey(new Date()));

  let html = `<div class="card"><h3>Presupuestos — ${mesNombre(mesKey(new Date()))}</h3>`;
  if (!pres.length) html += `<div class="empty">Todavía no definiste presupuestos.<br>Poné un límite mensual por categoría y te aviso por email al 80% y al 100%.</div>`;
  else html += pres.map(p => {
    const m = medidor(p, gastos[p.cat] || 0);
    return `<div onclick="editarPresupuesto('${esc(p.cat)}')">${m.html}</div>`;
  }).join('');
  html += `<button class="btn" style="margin-top:10px" onclick="editarPresupuesto('')">＋ Agregar / editar presupuesto</button></div>
  <div class="banner">💡 Las alertas llegan a tu correo (que en Android te aparece como notificación): una al llegar al 80% del límite y otra al superarlo.</div>`;
  v.innerHTML = html;
}

function editarPresupuesto(cat){
  const pres = data.presupuestos || [];
  const actual = pres.find(p => p.cat === cat);
  const cats = CATEGORIAS.filter(c => c !== 'Ingresos');
  abrirSheet(`
    <h2>${actual ? 'Editar' : 'Nuevo'} presupuesto</h2>
    <div class="field"><label>Categoría</label>
      <select id="pCat">${cats.map(c => `<option ${c===cat?'selected':''}>${esc(c)}</option>`).join('')}</select></div>
    <div class="field"><label>Límite mensual (₡)</label>
      <input id="pLim" type="number" inputmode="numeric" min="1" value="${actual ? actual.limite : ''}" placeholder="100000"></div>
    <button class="btn" onclick="guardarPresupuesto()">Guardar</button>
    ${actual ? `<button class="btn danger" style="margin-top:10px" onclick="borrarPresupuesto('${esc(cat)}')">Eliminar presupuesto</button>` : ''}
  `);
}
async function guardarPresupuesto(){
  const cat = document.getElementById('pCat').value;
  const lim = Number(document.getElementById('pLim').value);
  if (!lim || lim <= 0){ toast('Poné un límite válido'); return; }
  const items = (data.presupuestos || []).filter(p => p.cat !== cat);
  items.push({ cat, limite: lim });
  await persistirPresupuestos(items);
}
async function borrarPresupuesto(cat){
  await persistirPresupuestos((data.presupuestos || []).filter(p => p.cat !== cat));
}
async function persistirPresupuestos(items){
  cerrarSheet();
  const prev = data.presupuestos;
  data.presupuestos = items; render();
  try { await api('saveBudgets', { items }); guardarLS(LS_DATA, data); toast('✓ Presupuestos guardados'); }
  catch (e) { data.presupuestos = prev; render(); toast('✕ ' + e.message); }
}

// ================================================================
// VISTA: METAS
// ================================================================
function ahorroDesde(inicioMs){
  let s = 0;
  txs().forEach(t => { if (t.f >= inicioMs) s += (t.cat === 'Ingresos' ? t.m : -t.m); });
  return s;
}
function renderMetas(){
  const v = document.getElementById('view-metas');
  if (!data){ v.innerHTML = estadoCarga(); return; }
  const metas = data.metas || [];
  let html = '';
  if (!metas.length) html += `<div class="card"><h3>Metas de ahorro</h3>
    <div class="empty">Definí una meta (ej: “Viaje”, ₡500.000) y la app trackea tu avance con lo que te sobra: ingresos menos gastos desde la fecha de inicio.</div></div>`;
  else metas.forEach((g, idx) => {
    const ahorro = Math.max(0, ahorroDesde(g.inicio || 0));
    const pct = Math.min(ahorro / g.objetivo, 1);
    html += `<div class="card goal" onclick="editarMeta(${idx})">
      <div class="top"><span class="nm">🎯 ${esc(g.nombre)}</span><span class="pc num">${Math.round(pct*100)}%</span></div>
      <div class="track"><div class="fill" style="width:${pct*100}%"></div></div>
      <div class="sub num">${crc(ahorro)} de ${crc(g.objetivo)}
        · desde ${new Date(g.inicio).toLocaleDateString('es-CR',{month:'short', year:'numeric'})}</div>
      ${g.nota ? `<div class="note">${esc(g.nota)}</div>` : ''}
    </div>`;
  });
  html += `<button class="btn" onclick="editarMeta(-1)">＋ Nueva meta</button>
    <div class="banner" style="margin-top:14px">El progreso se calcula como <b>ingresos − gastos</b> acumulados desde la fecha de inicio de la meta.</div>`;
  v.innerHTML = html;
}
function editarMeta(idx){
  const g = idx >= 0 ? data.metas[idx] : null;
  abrirSheet(`
    <h2>${g ? 'Editar' : 'Nueva'} meta</h2>
    <div class="field"><label>Nombre</label><input id="gNom" value="${g ? esc(g.nombre) : ''}" placeholder="Viaje a…"></div>
    <div class="field"><label>Monto objetivo (₡)</label>
      <input id="gObj" type="number" inputmode="numeric" value="${g ? g.objetivo : ''}" placeholder="500000"></div>
    <div class="field"><label>Fecha de inicio</label>
      <input id="gIni" type="date" value="${new Date(g ? g.inicio : Date.now()).toISOString().slice(0,10)}"></div>
    <div class="field"><label>Nota (opcional)</label><input id="gNota" value="${g ? esc(g.nota||'') : ''}"></div>
    <button class="btn" onclick="guardarMeta(${idx})">Guardar</button>
    ${g ? `<button class="btn danger" style="margin-top:10px" onclick="borrarMeta(${idx})">Eliminar meta</button>` : ''}
  `);
}
async function guardarMeta(idx){
  const nombre = document.getElementById('gNom').value.trim();
  const objetivo = Number(document.getElementById('gObj').value);
  const inicio = new Date(document.getElementById('gIni').value + 'T00:00:00').getTime();
  const nota = document.getElementById('gNota').value;
  if (!nombre || !objetivo || objetivo <= 0){ toast('Completá nombre y objetivo'); return; }
  const items = [...(data.metas || [])];
  const nueva = { nombre, objetivo, inicio, nota };
  if (idx >= 0) items[idx] = nueva; else items.push(nueva);
  await persistirMetas(items);
}
async function borrarMeta(idx){
  const items = (data.metas || []).filter((_, i) => i !== idx);
  await persistirMetas(items);
}
async function persistirMetas(items){
  cerrarSheet();
  const prev = data.metas;
  data.metas = items; render();
  try { await api('saveGoals', { items }); guardarLS(LS_DATA, data); toast('✓ Metas guardadas'); }
  catch (e) { data.metas = prev; render(); toast('✕ ' + e.message); }
}

// ================================================================
// VISTA: AJUSTES
// ================================================================
function renderAjustes(){
  const v = document.getElementById('view-ajustes');
  const ult = data && data.ts ? new Date(data.ts).toLocaleString('es-CR',{dateStyle:'short', timeStyle:'short'}) : '—';
  v.innerHTML = `
  <div class="card"><h3>Conexión con tu Google Sheet</h3>
    <div class="field"><label>URL de la API (termina en /exec)</label>
      <input id="cfgUrl" value="${esc(cfg.url)}" placeholder="https://script.google.com/macros/s/…/exec"></div>
    <div class="field"><label>Token secreto</label>
      <input id="cfgTok" value="${esc(cfg.token)}" placeholder="Pegá el token de configurarApi()"></div>
    <button class="btn" onclick="probarConexion()">Probar y guardar</button>
    <div class="setrow" style="margin-top:8px"><div><div class="l">Estado</div>
      <div class="s">${demo() ? 'Modo demo (sin conexión configurada)' : 'Conectado · última sincronización: ' + ult}</div></div></div>
  </div>
  <div class="card"><h3>Apariencia</h3>
    <div class="setrow"><div class="l">Tema</div>
      <div class="seg">
        ${['auto','light','dark'].map(t => `<button class="${cfg.theme===t?'on':''}" onclick="setTema('${t}')">${{auto:'Auto',light:'Claro',dark:'Oscuro'}[t]}</button>`).join('')}
      </div></div>
  </div>
  <div class="card"><h3>Herramientas</h3>
    <div class="setrow" onclick="exportarCSV()"><div><div class="l">Exportar CSV</div>
      <div class="s">Movimientos de ${mesNombre(mesSel).toLowerCase()}</div></div><div>›</div></div>
    <div class="setrow" onclick="sync(true)"><div><div class="l">Recargar datos ahora</div>
      <div class="s">Trae lo último desde el Sheet</div></div><div>›</div></div>
  </div>
  <div class="banner">Los datos viven en tu Google Sheet — la app solo los lee y escribe ahí.
    Alertas de presupuesto y resumen semanal llegan por correo.</div>`;
}
async function probarConexion(){
  const url = document.getElementById('cfgUrl').value.trim();
  const tok = document.getElementById('cfgTok').value.trim();
  if (!url || !tok){ toast('Completá la URL y el token'); return; }
  toast('Probando conexión…');
  try {
    const res = await fetch(url, { method:'POST', headers:{'Content-Type':'text/plain;charset=utf-8'},
      body: JSON.stringify({ token: tok, action: 'ping' }) });
    const texto = await res.text();
    let j;
    try { j = JSON.parse(texto); }
    catch (e) { throw new Error('la URL no devuelve datos — verificá el acceso "Cualquier persona" y que termine en /exec'); }
    if (!j.ok) throw new Error(j.error || 'respuesta inválida');
    cfg.url = url; cfg.token = tok; guardarLS(LS_CFG, cfg);
    data = null; localStorage.removeItem(LS_DATA);
    toast('✓ Conectado. Cargando tus datos…');
    await sync();
  } catch (e) { toast('✕ No conecta: ' + e.message); }
}
function setTema(t){ cfg.theme = t; guardarLS(LS_CFG, cfg); aplicarTema(); renderAjustes(); }
function aplicarTema(){
  const oscuro = cfg.theme === 'dark' ||
    (cfg.theme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
  document.documentElement.dataset.theme = oscuro ? 'dark' : 'light';
  document.getElementById('metaTheme').setAttribute('content', oscuro ? '#0d0d0d' : '#f9f9f7');
}
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if (cfg.theme === 'auto') aplicarTema();
});

function exportarCSV(){
  const filas = [['Fecha','Tipo','Comercio','Categoría','Monto','Notas']];
  txDelMes(mesSel).sort((a,b) => a.f - b.f).forEach(t => filas.push([
    new Date(t.f).toISOString().slice(0,10), t.t, t.c, t.cat, t.m, t.n ]));
  const csv = '﻿' + filas.map(f => f.map(v => '"' + String(v).replace(/"/g,'""') + '"').join(',')).join('\n');
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], { type:'text/csv;charset=utf-8' }));
  a.download = 'finanzas-' + mesSel + '.csv';
  a.click();
  toast('CSV descargado');
}

// ================================================================
// BOTTOM SHEET / TOAST / PULL-TO-REFRESH
// ================================================================
function abrirSheet(html){
  document.getElementById('sheetBody').innerHTML = html;
  document.getElementById('backdrop').classList.add('show');
  document.getElementById('sheet').classList.add('show');
}
function cerrarSheet(){
  document.getElementById('backdrop').classList.remove('show');
  document.getElementById('sheet').classList.remove('show');
}
let toastT;
function toast(msg){
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastT); toastT = setTimeout(() => el.classList.remove('show'), 2600);
}

// Pull-to-refresh sencillo
let ptrY = null;
document.addEventListener('touchstart', e => {
  if (window.scrollY === 0 && !document.getElementById('sheet').classList.contains('show'))
    ptrY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchmove', e => {
  if (ptrY === null) return;
  const d = e.touches[0].clientY - ptrY;
  document.getElementById('ptr').style.height = d > 30 ? Math.min((d-30)/2, 34) + 'px' : '0';
}, { passive: true });
document.addEventListener('touchend', e => {
  if (ptrY !== null && parseInt(document.getElementById('ptr').style.height) >= 30) sync(true);
  document.getElementById('ptr').style.height = '0'; ptrY = null;
}, { passive: true });

// ================================================================
// ARRANQUE
// ================================================================
aplicarTema();
if (demo() && !data) generarDemo();
render();
irA('inicio');
if (!demo()) sync();
// re-sincroniza al volver a la app si pasaron >5 minutos
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && !demo() && data && Date.now() - data.ts > 5*60*1000) sync();
});
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(() => {});
</script>
